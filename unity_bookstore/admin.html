<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Master Admin Dashboard - Unity Bookstore</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<script>
    if (sessionStorage.getItem('isAdminLoggedIn') !== 'true') {
        window.location.href = 'admin_login.html';
    }
</script>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <span class="navbar-brand">Unity Bookstore <span class="badge bg-danger">ADMIN</span></span>
            <div>
                <a href="index.html" class="btn btn-outline-light btn-sm me-2">View Shop</a>
                <button onclick="sessionStorage.clear(); window.location.href='index.html';" class="btn btn-danger btn-sm">Logout</button>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="row mb-4">
            <div class="col-md-4">
                <div class="card bg-success text-white shadow-sm">
                    <div class="card-body text-center">
                        <h6>Total Revenue</h6>
                        <h2 id="revenue-display">ETB 0.00</h2>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card bg-primary text-white shadow-sm">
                    <div class="card-body text-center">
                        <h6>Orders Processed</h6>
                        <h2 id="order-count">0</h2>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card bg-dark text-white shadow-sm">
                    <div class="card-body text-center">
                        <h6>System Tools</h6>
                        <button class="btn btn-sm btn-outline-warning" onclick="resetStore()">Reset Entire Store</button>
                        <button id="convert-currency-btn" class="btn btn-sm btn-outline-info ms-2" onclick="startCurrencyConversion()">Convert USD → ETB</button>
                        <div id="conversion-status" class="mt-2 small text-light"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-md-4">
                <div class="card shadow-sm mb-4">
                    <div class="card-header bg-white fw-bold">Add New Book</div>
                    <div class="card-body">
                        <form id="add-book-form">
                            <input type="text" id="admin-title" class="form-control mb-2" placeholder="Book Title" required>
                            <input type="text" id="admin-author" class="form-control mb-2" placeholder="Author" required>
                            <input type="number" id="admin-price" class="form-control mb-2" placeholder="Price" step="0.01" required>
                            <select id="admin-category" class="form-select mb-3">
                                <option value="education">Education</option>
                                <option value="fiction">Fiction</option>
                                <option value="research">Research</option>
                                <option value="children">Children</option>
                            </select>
                            <button type="submit" class="btn btn-primary w-100">Add to Catalog</button>
                        </form>
                    </div>
                </div>
                
                <div class="card shadow-sm">
                    <div class="card-header bg-white fw-bold">Recent Transactions</div>
                    <div class="card-body p-0">
                        <div style="max-height: 300px; overflow-y: auto;">
                            <table class="table table-sm mb-0">
                                <tbody id="admin-ledger">
                                    </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-md-8">
                <div class="card shadow-sm">
                    <div class="card-header bg-white fw-bold">Live Inventory Control</div>
                    <div class="card-body">
                        <table class="table table-hover align-middle">
                            <thead>
                                <tr>
                                    <th>Book Info</th>
                                    <th>Price</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="admin-inventory">
                                </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/admin.js"></script>
</body>
</html>
