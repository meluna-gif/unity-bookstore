<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Login - Unity Bookstore</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark d-flex align-items-center justify-content-center" style="height: 100vh;">

    <div class="card shadow-lg" style="width: 400px;">
        <div class="card-body p-5 text-center">
            <h3 class="mb-4">Staff Login</h3>
            <div class="mb-3 text-start">
                <label class="form-label">Username</label>
                <input type="text" id="admin-user" class="form-control" value="admin" readonly>
            </div>
            <div class="mb-3 text-start">
                <label class="form-label">Password</label>
                <input type="password" id="admin-pass" class="form-control" placeholder="Enter password">
            </div>
            <button class="btn btn-danger w-100" onclick="checkLogin()">Access Panel</button>
            <p id="error-msg" class="text-danger mt-3 d-none">Invalid Credentials!</p>
            <a href="index.html" class="d-block mt-3 text-muted small text-decoration-none">← Back to Store</a>
        </div>
    </div>

    <script>
        function checkLogin() {
            const pass = document.getElementById('admin-pass').value;
            // You can set any password you want here
            if (pass === "unity123") {
                // Set a 'session' in local storage to remember we logged in
                sessionStorage.setItem('isAdminLoggedIn', 'true');
                window.location.href = 'admin.html';
            } else {
                document.getElementById('error-msg').classList.remove('d-none');
            }
        }
    </script>
</body>
</html>
