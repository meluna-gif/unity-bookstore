<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Transaction History - Unity Bookstore</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="index.html">Unity Bookstore</a>
            <div class="d-flex text-white align-items-center">
                <span class="me-3">Balance: ETB <span id="history-balance">0.00</span></span>
                <a href="books.html" class="btn btn-outline-light btn-sm">Back to Shop</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-10">
                <div class="card shadow">
                    <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
                        <h4 class="mb-0">Bank Statement</h4>
                        <button class="btn btn-sm btn-light" onclick="window.print()">
                            <i class="bi bi-printer"></i> Print PDF
                        </button>
                    </div>
                    <div class="card-body">
                        <table class="table table-hover">
                            <thead class="table-light">
                                <tr>
                                    <th>Date</th>
                                    <th>Transaction ID</th>
                                    <th>Type</th>
                                    <th>Status</th>
                                    <th class="text-end">Amount</th>
                                </tr>
                            </thead>
                            <tbody id="transaction-rows">
                                </tbody>
                        </table>
                        <div id="no-transactions" class="text-center py-5 d-none">
                            <i class="bi bi-receipt text-muted" style="font-size: 3rem;"></i>
                            <p class="mt-3">No transactions found yet.</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/script.js"></script>
    <script>
        // Logic to load history specifically for this page
        document.addEventListener('DOMContentLoaded', function() {
            const balance = localStorage.getItem('user_balance') || '500.00';
            document.getElementById('history-balance').textContent = balance;

            const transactions = JSON.parse(localStorage.getItem('transactions')) || [];
            const container = document.getElementById('transaction-rows');
            const emptyMessage = document.getElementById('no-transactions');

            if (transactions.length === 0) {
                emptyMessage.classList.remove('d-none');
            } else {
                // Show newest transactions first
                transactions.reverse().forEach(trx => {
                    const row = `
                        <tr>
                            <td>${trx.date}</td>
                            <td><small class="text-muted">${trx.id}</small></td>
                            <td><span class="badge bg-info text-dark">${trx.type}</span></td>
                            <td><span class="badge bg-success">Completed</span></td>
                            <td class="text-end fw-bold text-danger">- ETB ${trx.amount}</td>
                        </tr>
                    `;
                    container.innerHTML += row;
                });
            }
        });
    </script>
</body>
</html>
